name: Solana Wallet Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分钟一次（GitHub Actions 实际可能延迟到 5-15 分钟）
  workflow_dispatch:

permissions:
  contents: write   # 允许 commit state.json

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run monitor
        env:
          WALLET_ADDRESS:     ${{ secrets.WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python 捡尸监控/monitor.py

      - name: Commit state
        run: |
          if [ -f 捡尸监控/state.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add 捡尸监控/state.json
            git diff --cached --quiet || git commit -m "更新监控状态 [skip ci]"
            git push
          fi
